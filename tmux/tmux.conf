# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -, like emacs
bind | split-window -v -c '#{pane_current_path}'
bind - split-window -h -c '#{pane_current_path}'
unbind '"'
unbind %

# reload config file (change file location to your the tmux.conf you want to
# use)
bind r source-file ~/.tmux.conf

# don't rename windows automatically
set-option -g allow-rename off

# Set terminal
set -g default-terminal "screen-256color"

# Setup windows

# Allow escape passthrough for emacs-libvterm directory tracking.
# allow-passthrough only exists in tmux 3.3+, so guard it or 3.2a errors on load.
# (Functional vterm dir-tracking through tmux needs 3.3+ anyway: `module load tmux/3.5a`.)
%if "#{>=:#{version},3.3}"
set -g allow-passthrough on
%endif

######################
### DESIGN CHANGES ###
######################

#
# Status bar
#

set -g status-interval 1
set -g status on
setw -g window-status-format "#[fg=cyan,bg=brightblack,nobold,noitalics,nounderscore]#I:#W ❯"
setw -g window-status-current-format "#[fg=cyan,bg=brightblack,nobold,noitalics,nounderscore]*#I:#W ❯"
set -g status-style "fg=cyan,bg=brightblack,nobold,noitalics,nounderscore"
set -g status-left "#[fg=lightblue,bg=black,nobold,noitalics,nounderscore]❯ #[bg=black,fg=lightblue,bold]#S #[fg=lightblue,bg=black,nobold,noitalics,nounderscore]❯❯ "
set -g status-right "#[fg=grey,bg=black,nobold,noitalics,nounderscore]❮#[fg=grey,bg=brightblack] %Y-%m-%d #[fg=grey,bg=brightblack,nobold,noitalics,nounderscore]❮#[fg=grey,bg=brightblack] %I:%M %p #[fg=cyan,bg=brightblack,nobold,noitalics,nounderscore]❮#[fg=cyan,bold,bg=brightblack] #H #[fg=cyan,bg=brightblack,nobold,noitalics,nounderscore]❮"
#set -g status-format "#{E:status-left}"
#set -g status-format "#{W:#{E:window-status-format} ,#{E:window-status-current-format} }"
# #{W:#{E:window-status-format} ,#{E:window-status-current-format} } #{E:status-right}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'erikw/tmux-powerline'

# Bootstrap tpm on a fresh machine, then initialize it.
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
run '~/.tmux/plugins/tpm/tpm'

# --- Overlays: each repo in ~/lib/dotfiles-overlays/ drops tmux/*.conf here.
# -q = no error if none match.
source-file -q ~/lib/dotfiles-overlays/*/tmux/*.conf
