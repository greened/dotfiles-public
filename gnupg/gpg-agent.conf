# Managed by dotfiles (symlinked to ~/.gnupg/gpg-agent.conf by link.sh).
#
# Use the native macOS pinentry (GUI dialog) for passphrase prompts.  It is
# reachable from GUI emacs, terminals, and `pass'/auth-source alike, and avoids
# the emacs-pinentry server, which could hang with a "Selecting deleted buffer"
# GETPIN error.  `allow-loopback-pinentry' still pairs with
# `(setq epg-pinentry-mode 'loopback)' for emacs' minibuffer-prompt fallback.
pinentry-program /opt/homebrew/bin/pinentry-mac
allow-loopback-pinentry
