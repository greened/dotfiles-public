# Managed by dotfiles (symlinked to ~/.gnupg/gpg-agent.conf by link.sh).
#
# Let emacs serve GPG passphrase prompts, so decryption works inside emacs
# where no terminal pinentry is reachable (GUI emacs, or auth-source-pass
# decrypting a `pass' entry).  `allow-emacs-pinentry' pairs with (pinentry-start)
# in the emacs config; `allow-loopback-pinentry' pairs with
# `(setq epg-pinentry-mode 'loopback)' for the minibuffer-prompt fallback.
allow-emacs-pinentry
allow-loopback-pinentry
